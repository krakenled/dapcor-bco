        <div style="border:1px solid #6366f1;border-radius:12px;overflow:hidden;background:var(--card)">
          <div id="claude-drop-zone" ondragover="event.preventDefault();this.style.background='rgba(99,102,241,0.1)'" ondragleave="this.style.background=''" ondrop="claudeFileDrop(event)" style="padding:.75rem 1rem;border-bottom:0.5px solid var(--border);cursor:pointer;text-align:center;font-size:13px;color:var(--text3);transition:background .2s" onclick="document.getElementById('claude-file-input').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:4px;display:block;margin:0 auto 4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Drop files here or tap to upload — invoices, photos, PDFs
          </div>
          <input type="file" id="claude-file-input" multiple accept="image/*,.pdf,.xlsx,.csv" style="display:none" onchange="claudeFileSelect(this)">
          <div id="claude-file-preview" style="display:none;padding:.5rem 1rem;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text3)"></div>
          <div style="display:flex;gap:8px;padding:.75rem 1rem;align-items:flex-end">
            <textarea id="claude-page-input" class="inp" placeholder="Ask me anything — add products, suppliers, check quotes, book labour..." style="flex:1;border-radius:8px;font-size:13px;min-height:44px;max-height:120px;resize:vertical" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();claudePageSend()}"></textarea>
            <button onclick="claudePageSend()" style="width:38px;height:38px;border-radius:50%;background:#6366f1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;padding:.75rem 1rem 0;flex-wrap:wrap">
        <span onclick="claudePageQuick('Add a new product')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">Add product</span>
        <span onclick="claudePageQuick('Add a new supplier')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">Add supplier</span>
        <span onclick="claudePageQuick('Check my open quotes')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">My quotes</span>
        <span onclick="claudePageQuick('Book a labourer for tomorrow')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">Book labour</span>
        <span onclick="claudePageQuick('Check invoice prices against our records')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">Check invoice</span>
        <span onclick="claudePageQuick('Update a product price')" style="font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text3);cursor:pointer">Update price</span>
      </div>
    </div>`;
  claudePageAddMsg('Hi — what do you need? I can check materials, read invoices, book labour, or answer any site question.', false);
  
  // Staged demo — plays automatically
  setTimeout(() => runClaudeDemo(), 800);
}

function runClaudeDemo() {
  const question = 'I need to build a wall — external CFC skin, timber frame, Gyprock internal skin. What framing timber and CFC do I need and who supplies it?';
  
  claudePageAddMsg(question, true);
  claudePageAddMsg('<span class="typing-dots">Thinking<span>.</span><span>.</span><span>.</span></span>', false, 'claude-typing');

  setTimeout(() => {
    document.getElementById('claude-typing')?.remove();
    const reply = `Good question — here's what you need for that wall build-up:

🪵 FRAMING TIMBER
LVL 90x45 E10 (6m lengths) — structural grade, ideal for external wall frames.
• Supplier: Covert Procurement
• You have 16 lengths in yard stock right now
• For a standard wall frame, allow 1 length per 900mm of wall run plus top/bottom plates and noggings

📋 CFC SHEETING (External skin)
James Hardie Hardifine Texture Cladding 8.5mm — confirmed in yard stock (1 sheet)
CFC 2400x1200 10mm External — also in yard stock (4 sheets)

For a full external CFC build you'll likely need more. Covert Procurement supplies both — same supplier as your LVL timber so you can consolidate the order and save on freight.

💡 Build-up reminder:
External → CFC 10mm → 90x45 LVL frame @ 450 ctrs → R2.0 batts → Gyprock 13mm internal

Want me to calculate quantities based on the wall area, or send a quote request to Covert Procurement?`;

    claudePageAddMsg(reply, false);
    claudePageHistory.push({ role: 'user', content: question });
    claudePageHistory.push({ role: 'assistant', content: reply });
  }, 2800);
}

var claudePageHistory = [];
var claudeAttachedFiles = [];

function claudeFileSelect(input) {
  claudeAttachedFiles = Array.from(input.files);
  showFilePreview();
}

function claudeFileDrop(e) {
  e.preventDefault();
  document.getElementById('claude-drop-zone').style.background = '';
  claudeAttachedFiles = Array.from(e.dataTransfer.files);
  showFilePreview();
}

function showFilePreview() {
  const pv = document.getElementById('claude-file-preview');
  if (!claudeAttachedFiles.length) { pv.style.display = 'none'; return; }
  pv.style.display = 'block';
  pv.innerHTML = claudeAttachedFiles.map(f => `📎 ${f.name} (${(f.size/1024).toFixed(0)}kb)`).join(' &nbsp;·&nbsp; ')
    + ` <span onclick="claudeAttachedFiles=[];showFilePreview()" style="color:var(--primary);cursor:pointer;margin-left:6px">clear</span>`;
}

async function claudePageQuick(text) {
  document.getElementById('claude-page-input').value = text;
  claudePageSend();
}

async function claudePageSend() {
  const input = document.getElementById('claude-page-input');
  const text = input.value.trim();
  if (!text && !claudeAttachedFiles.length) return;
  input.value = '';

  const userText = text + (claudeAttachedFiles.length ? ` [${claudeAttachedFiles.length} file(s) attached]` : '');
  claudePageAddMsg(userText, true);
  claudeAttachedFiles = [];
  showFilePreview && showFilePreview();

  claudePageAddMsg('<span class="typing-dots">Thinking<span>.</span><span>.</span><span>.</span></span>', false, 'claude-typing');

  const systemPrompt = `You are the Dapcor BCO assistant — an AI embedded in Dapcor Building Services' procurement and operations platform. You help with:
- Adding products to the product library (identify template: bag, sheet/board, linear, tube/sausage)
- Adding supplier profiles
- Checking and summarising open quote requests
- Booking labour hire (JV Labour, contact Adrian)
- Reading invoices and flagging price discrepancies
- Updating prices

Current product categories: Sand, Cement, Concrete, Aggregate, Waterproofing, Structural Repair, Timber, Protection.
Dapcor account: 16 Booralee St Botany NSW 2019. Yard Manager: Ben Lawrence.

Keep responses concise and action-focused. When adding a product, confirm all fields extracted. When a field is missing, ask for it.`;

  try {
    const messages = [...claudePageHistory, { role: 'user', content: text || 'I have attached a file for you to review.' }];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-opus-4-6', max_tokens: 1000, system: systemPrompt, messages })
    });
    const data = await res.json();
    const reply = data.content?.map(c => c.text || '').join('') || 'Sorry, I could not get a response.';
    claudePageHistory.push({ role: 'user', content: text });
    claudePageHistory.push({ role: 'assistant', content: reply });
    if (claudePageHistory.length > 20) claudePageHistory = claudePageHistory.slice(-20);
    document.getElementById('claude-typing')?.remove();
    claudePageAddMsg(reply, false);
  } catch(e) {
    document.getElementById('claude-typing')?.remove();
    claudePageAddMsg('Connection error — please try again.', false);
  }
}

function claudePageAddMsg(text, isUser, id) {
  const msgs = document.getElementById('claude-page-msgs');
  if (!msgs) return;
  const div = document.createElement('div');
  if (id) div.id = id;
  div.style.cssText = `display:flex;justify-content:${isUser?'flex-end':'flex-start'};margin-bottom:.6rem`;
  div.innerHTML = `<div style="max-width:88%;padding:.6rem .85rem;border-radius:${isUser?'12px 4px 12px 12px':'4px 12px 12px 12px'};background:${isUser?'#6366f1':'var(--card2)'};color:${isUser?'#fff':'var(--text)'};font-size:13px;line-height:1.5;white-space:pre-wrap">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
