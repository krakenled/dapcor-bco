<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Dapcor BCO</title>
<style>
:root{--pr:#f97316;--pr-dk:#ea580c;--pr-bg:rgba(249,115,22,.12);--bg:#0f0f1a;--bg2:#1a1a2e;--card:#1e1e32;--card2:#252540;--border:#2d2d50;--border2:#3a3a60;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#22c55e;--green-bg:rgba(34,197,94,.12);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--yellow:#eab308;--yellow-bg:rgba(234,179,8,.12);--blue:#3b82f6;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--bg2);padding:12px 16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:17px;font-weight:700;color:var(--pr);flex:1}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:1px}
.back-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;display:none;align-items:center;flex-shrink:0}
.content{flex:1;padding:12px;padding-bottom:86px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;font-weight:500;position:relative;transition:color .15s;font-family:inherit}
.nav-btn.active{color:var(--pr)}
.nav-btn svg{width:21px;height:21px}
.badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--pr);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:15px;text-align:center}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.inp{width:100%;padding:10px 12px;background:var(--card2);border:.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--pr)}.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:70px}
.btn{padding:11px 16px;border-radius:var(--rs);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-pr{background:var(--pr);color:#fff}.btn-full{width:100%;display:block;margin-bottom:8px}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:16px}
.sec:first-child{margin-top:0}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill-g{background:var(--green-bg);color:var(--green)}.pill-r{background:var(--red-bg);color:var(--red)}
.pill-y{background:var(--yellow-bg);color:var(--yellow)}.pill-o{background:var(--pr-bg);color:var(--pr)}
.pill-b{background:rgba(59,130,246,.15);color:var(--blue)}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;border:.5px solid var(--border2);max-width:320px;text-align:center}
/* Prod grid */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.prod-card.in-cart{border-color:var(--pr);box-shadow:0 0 0 1px var(--pr-bg)}
.qty-b{width:26px;height:26px;border-radius:6px;border:.5px solid var(--border);background:var(--card2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.qty-n{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--text);background:none;border:none;outline:none;min-width:0;font-family:inherit;padding:0}
.cart-b{width:26px;height:26px;border-radius:6px;background:var(--pr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Spec bubble */
#spec-bubble{position:fixed;z-index:800;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;width:210px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;pointer-events:none}
/* Modal */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-end}
#mo.open{display:flex}
#ms{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.mh{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto}
/* Flag cards */
.flag-card{border-radius:var(--rs);padding:12px;margin-bottom:8px;border-left:3px solid}
.flag-red{background:var(--red-bg);border-color:var(--red)}
.flag-yellow{background:var(--yellow-bg);border-color:var(--yellow)}
/* Slot */
.slot-btn{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;margin-bottom:8px;font-family:inherit;width:100%;color:var(--text)}
.slot-btn.sel{border-color:var(--pr);background:var(--pr-bg)}
/* Login */
.login-user{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--pr-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--pr);flex-shrink:0}
/* Cat picker btn */
.cat-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--card2);border:.5px solid var(--border);border-radius:20px;cursor:pointer;font-family:inherit;color:var(--text);font-size:13px;font-weight:500;margin-bottom:12px;width:100%}
.cat-btn.filtered{border-color:var(--pr);background:var(--pr-bg);color:var(--pr)}
/* Cat grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.cat-item{padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;font-family:inherit}
.cat-item.active{border-color:var(--pr);background:var(--pr-bg)}
/* Calc */
.calc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.calc-inp{padding:8px;background:var(--card2);border:.5px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none;width:100%;text-align:center;font-family:inherit}
.calc-inp:focus{border-color:var(--pr)}
/* Related */
.related-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border-radius:8px;margin-bottom:6px;cursor:pointer}
@media print{.nav,.hdr,#toast,.no-print{display:none!important}}
/* PIN pad */
.pin-display{display:flex;gap:12px;justify-content:center;margin:24px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:background .15s}
.pin-dot.filled{background:var(--pr);border-color:var(--pr)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-key{padding:18px;border-radius:12px;border:.5px solid var(--border);background:var(--card2);font-size:20px;font-weight:600;cursor:pointer;text-align:center;color:var(--text);font-family:inherit;transition:background .1s}
.pin-key:active{background:var(--border2)}
.pin-key.del{color:var(--red)}
/* Driver UI */
.run-card{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.run-expand{background:var(--card2);border-radius:var(--rs);padding:12px;margin-top:10px;display:none}
.run-expand.open{display:block}
/* Anthony big button */
.big-btn{width:100%;aspect-ratio:1;border-radius:24px;border:none;background:var(--pr);color:#fff;font-size:28px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;box-shadow:0 8px 32px rgba(249,115,22,.4);font-family:inherit}
.big-btn:active{transform:scale(.96);box-shadow:0 4px 16px rgba(249,115,22,.3)}
/* Schedule */
.sched-slot{margin-bottom:16px}
.sched-slot-hdr{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px;padding:6px 10px;background:var(--pr-bg);border-radius:6px}
.sched-event{background:var(--card);border:.5px solid var(--border);border-radius:var(--rs);margin-bottom:6px;overflow:hidden;cursor:pointer}
.sched-event-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
.sched-event-body{padding:0 12px 12px;display:none;border-top:.5px solid var(--border)}
.sched-event-body.open{display:block}
</style>
</head>

function go(page,push=true){

  CP=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  const pg=document.getElementById('page-'+page);if(pg)pg.classList.add('active');

  const backPages=['detail','cart','booking','job','stock','users','pin','schedule'];

}

function pinKey(k){
  if(k==='⌫'){pinEntry=pinEntry.slice(0,-1);}
  else if(pinEntry.length<4){pinEntry+=k;}
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<pinEntry.length);}
  if(pinEntry.length===4)setTimeout(checkPIN,200);
}

function checkPIN(){
  const u=USERS.find(x=>x.id===pinUserId);
  if(pinEntry===(u?.pin||'0000')){
    CU=u;pinEntry='';pinUserId=null;
    STOCK.forEach(s=>{if(!cardQty[s.id])cardQty[s.id]=0});
    yardCat='All';yardSearch='';
    buildNav();
    const ui=CU.ui||'standard';
    if(ui==='anthony')go('anthony',false);
    else if(ui==='driver')go('driver',false);
    else go('home',false);
  } else {
    pinEntry='';
    for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.remove('filled');}
    const err=document.getElementById('pin-err');
    if(err){err.textContent='Incorrect PIN — try again';setTimeout(()=>{if(err)err.textContent=''},2000);}
  }
}

        oninput="cardQty['${item.id}']=parseInt(this.value)||0;this.style.color=cardQty['${item.id}']>0?'var(--pr)':'var(--text)'"
        style="color:${qty>0?'var(--pr)':'var(--text)'}">
      <button class="qty-b" onclick="adjQty('${item.id}',1)">+</button>
      <button class="cart-b" onclick="addToCart('${item.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>

function adjQty(id,d){
  cardQty[id]=Math.max(0,(cardQty[id]||0)+d);
  const inp=document.getElementById('qn-'+id);
  if(inp){inp.value=cardQty[id];inp.style.color=cardQty[id]>0?'var(--pr)':'var(--text)'}
}
function addToCart(id){
  const item=STOCK.find(s=>s.id===id);if(!item)return;
  const qty=cardQty[id]||0;
  if(!qty){toast('Set a quantity first');return}
  if(!item.qty&&!item.onOrder){toast('Out of stock');return}
  const ex=cart.findIndex(c=>c.id===id);
  if(ex>=0)cart[ex].qty=qty;
  else cart.push({id,name:item.name,brand:item.brand,cat:item.cat,qty,price:item.price,weight:item.weight,billing:item.billing,unit:item.unit,waterSensitive:item.waterSensitive});
  cardQty[id]=0;
  const inp=document.getElementById('qn-'+id);if(inp){inp.value=0;inp.style.color='var(--text)'}
  document.getElementById('card-'+id)?.classList.add('in-cart');
  toast(`${item.name} added ✓`);updateBadge();
}

// Single / double tap
function handleTap(e,id){
  const now=Date.now();
  if(lastTapId===id&&now-lastTapTime<350){
    lastTapId=null;hideSpec();clearTimeout(specTimer);
    curDetail=id;go('detail');
  } else {
    lastTapId=id;lastTapTime=now;showSpec(id,e);
    clearTimeout(specTimer);specTimer=setTimeout(()=>{hideSpec();lastTapId=null},4000);
  }
}
function showSpec(id,e){
  const item=STOCK.find(s=>s.id===id);if(!item)return;
  const b=document.getElementById('spec-bubble');
  b.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--pr);margin-bottom:6px">${item.name}</div>
    ${item.waterSensitive?`<div style="font-size:10px;color:var(--blue);margin-bottom:4px">🌧️ Keep dry — water sensitive</div>`:''}
    <div style="font-size:11px;color:var(--text2);line-height:1.6">
      ${item.specs.packSize?'📦 '+item.specs.packSize+'<br>':''}
      ${item.specs.coverageRate&&item.specs.coverageRate!=='N/A'?'📐 '+item.specs.coverageRate+'<br>':''}
      ${item.weight?'⚖️ '+item.weight+'kg<br>':''}
      ${item.price>0?'💰 $'+item.price.toFixed(2)+' ex GST':''}
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:6px">Double tap for full specs →</div>`;
  b.style.display='block';
  const card=e.currentTarget?.closest?.('.prod-card')||e.target?.closest?.('.prod-card');
  const rect=card?card.getBoundingClientRect():{top:200,left:20,right:180};
  let top=rect.top-10,left=rect.right+8;
  if(left+220>window.innerWidth)left=rect.left-218;
  if(top+160>window.innerHeight)top=window.innerHeight-165;
  b.style.top=Math.max(10,top)+'px';b.style.left=Math.max(8,left)+'px';
}
function hideSpec(){document.getElementById('spec-bubble').style.display='none'}

function calcSausages(){
  const w=parseFloat(document.getElementById('cw')?.value)||0;
  const d=parseFloat(document.getElementById('cd')?.value)||0;
  const l=parseFloat(document.getElementById('cl')?.value)||0;
  const el=document.getElementById('calc-result');if(!el)return;
  if(!w||!d||!l){el.textContent='Enter dimensions above';return}
  const vol=w*d*l*1000; // mm² × lin.m × 1000mm/m = mm³
  const sausages=Math.ceil(vol/600000);
  el.textContent=`${sausages} sausage${sausages!==1?'s':''} needed`;
}

// ═══ BOOKING — WEEK VIEW ═══
const TRUCK_CAPACITY=2;
function getWorkingWeek(){
  const days=[];let d=new Date();d.setDate(d.getDate()+1);
  while(days.length<5){
    if(d.getDay()!==0&&d.getDay()!==6)days.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    d.setDate(d.getDate()+1);
  }
  return days;
}
async function fetchWeekAvailability(days){
  try{
    const start=addDays(days[0],-1)+'T12:00:00Z';
    const end=days[days.length-1]+'T14:00:00Z';
    const r=await fetch(`${SCRIPT}?action=bookings&start=${start}&end=${end}`);
    const data=await r.json();
    if(!data.ok)return{};
    const counts={};
    days.forEach(day=>{counts[day]={0:0,1:0,2:0};});
    data.bookings.forEach(ev=>{
      const aest=new Date(new Date(ev.start).getTime()+10*60*60*1000);
      const y=aest.getUTCFullYear(),m=String(aest.getUTCMonth()+1).padStart(2,'0'),d=String(aest.getUTCDate()).padStart(2,'0');
      const dateStr=`${y}-${m}-${d}`;
      const dur=(new Date(ev.end)-new Date(ev.start))/3600000;
      if(counts[dateStr]!==undefined&&dur<8){
        const h=aest.getUTCHours()+aest.getUTCMinutes()/60;
        const slot=h<10?0:h<13?1:2;
        counts[dateStr][slot]++;
      }
    });
    return counts;
  }catch(e){return{};}
}
let weekCounts={};
function renderBooking(){
  const rubOnly=cartRubbish&&!cart.length;
  const waterWarn=cart.some(i=>i.waterSensitive);
  const days=getWorkingWeek();
  const el=document.getElementById('page-booking');
  el.innerHTML=`
    ${waterWarn?`<div id="wx-warn" style="background:rgba(59,130,246,.12);border:1px solid var(--blue);border-radius:var(--r);padding:12px;margin-bottom:12px;font-size:13px;color:var(--blue)">🌧️ Checking weather…</div>`:''}

    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">🟢 Open &nbsp; 🟡 1 left &nbsp; 🔴 Full</div>
    <div id="week-grid"><div style="font-size:13px;color:var(--text3)">Loading availability…</div></div>
    ${rubOnly?`<div style="font-size:11px;color:var(--text3);margin-top:8px">🚫 Rubbish-only runs cannot take the 7:30am slot</div>`:''}
    <div id="slot-confirm" style="margin-top:16px;display:none">
      <div id="slot-confirm-body"></div>
      <button onclick="confirmBk()" class="btn btn-pr btn-full" style="padding:14px;font-size:15px;margin-top:10px">Confirm Booking ✓</button>
    </div>`;
  fetchWeekAvailability(days).then(counts=>{
    weekCounts=counts;
    const grid=document.getElementById('week-grid');if(!grid)return;
    const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html=`<table style="width:100%;border-collapse:collapse;table-layout:fixed">
      <tr><td style="width:58px;padding:4px 0"></td>
        ${days.map(d=>{const dt=new Date(d+'T12:00:00');return`<td style="text-align:center;padding:4px 2px"><div style="font-size:11px;font-weight:700;color:var(--text)">${DAYS_SHORT[dt.getDay()]}</div><div style="font-size:10px;color:var(--text3)">${dt.getDate()}/${dt.getMonth()+1}</div></td>`;}).join('')}
      </tr>
      ${SLOTS.map((slot,i)=>`<tr>
        <td style="font-size:9px;color:var(--text3);padding:4px 4px 4px 0;vertical-align:middle;line-height:1.3">${slot.split('–')[0].trim().replace(' ','<br>')}</td>
        ${days.map(d=>{
          const count=counts[d]?.[i]||0;
          const avail=TRUCK_CAPACITY-count;
          const blocked=rubOnly&&i===0;
          const col=blocked||avail<=0?'var(--red)':avail===1?'var(--yellow)':'var(--green)';
          const bg=blocked||avail<=0?'var(--red-bg)':avail===1?'var(--yellow-bg)':'var(--green-bg)';
          const label=blocked?'—':avail<=0?'Full':avail===1?'1 left':'Open';
          const disabled=blocked||avail<=0;
          const sel=bookDate===d&&bookSlot===i;
          return`<td style="text-align:center;padding:3px 2px">
            <button data-date="${d}" data-slot="${i}" data-disabled="${disabled?'1':'0'}"
              onclick="if(this.dataset.disabled!=='1')selectWeekSlot(this.dataset.date,parseInt(this.dataset.slot))"
              style="width:100%;padding:8px 2px;border-radius:8px;border:2px solid ${sel?col:'transparent'};background:${bg};cursor:${disabled?'not-allowed':'pointer'};display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;opacity:${disabled?'.4':'1'}">
              <div style="width:10px;height:10px;border-radius:50%;background:${col}"></div>
              <div style="font-size:9px;font-weight:600;color:${col}">${label}</div>
            </button></td>`;
        }).join('')}
      </tr>`).join('')}
    </table>`;
    grid.innerHTML=html;
    if(bookDate&&bookSlot!==null)showSlotConfirm(bookDate,bookSlot);
  });
  if(waterWarn){
    const mj=myJobs();
    if(mj[0])fetchWx(CU.level>=5?'yard':mj[0].procore).then(w=>{
      const el2=document.getElementById('wx-warn');if(!el2||!w)return;
      const idx=w.time.indexOf(bookDate);if(idx<0)return;
      const rain=w.precipitation_probability_max[idx],code=w.weather_code[idx];
      const bad=code>=51&&code<=82||rain>50;
      el2.innerHTML=bad?`🌧️ Rain warning ${bookDate}: ${rain}% — water-sensitive items in order.`:`✅ ${wxIcon(code)} Weather OK on ${bookDate} — ${rain}% rain.`;
      el2.style.background=bad?'rgba(59,130,246,.12)':'var(--green-bg)';
      el2.style.borderColor=bad?'var(--blue)':'var(--green)';
      el2.style.color=bad?'var(--blue)':'var(--green)';
    });
  }
}

function addDays(dateStr,n){
  const dt=new Date(dateStr+'T12:00:00');
  dt.setDate(dt.getDate()+n);
  return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function shiftDate(d){
  bookDate=addDays(bookDate,d);
  if(new Date(bookDate+'T12:00:00').getDay()===0)bookDate=addDays(bookDate,d>0?1:-2);
  bookSlot=null;renderBooking();

    const d=await r.json();

function confirmBk(){
  if(bookSlot===null){toast('Select a slot');return}
  const tv=cart.reduce((s,i)=>s+(i.price||0)*i.qty,0);
  if(tv>0&&tv<MIN_THRESH&&CU.level<4){
    if(!confirm(`Order is only $${tv.toFixed(2)} — truck costs $${TRUCK}.\nSubmit for manager approval?`))return;
    finalise('delivery',bookDate,SLOTS[bookSlot],'pending');
  } else finalise('delivery',bookDate,SLOTS[bookSlot],'sent');
}
function finalise(mode,date,slot,status='sent'){
  const mj=myJobs();
  if(!cartJobNo)cartJobNo=mj[0]?.po||'';
  // Find job by PO number (handles multi-site foremen correctly)
  const jobSite=JOBS.find(j=>j.po===cartJobNo)||mj[0]||{};
  const ord={
    id:'YO-'+Date.now().toString(36).toUpperCase(),
    ts:new Date().toISOString(),uid:CU.id,user:CU.name,userPhone:CU.phone,
    jobId:jobSite.id||'',jobNo:cartJobNo,
    siteAddress:jobSite.addr||'',
    mode,date,slot,slotIdx:SLOTS.indexOf(slot),
    items:cart.map(i=>({...i})),misc:Object.keys(cartMisc).filter(k=>cartMisc[k]),
    collectRubbish:cartRubbish,siteNote:cartNote,
    total:cart.reduce((s,i)=>s+(i.price||0)*i.qty,0),
    weight:cart.reduce((s,i)=>s+(i.weight||0)*i.qty,0),status
  };
  orders.unshift(ord);saveOrders();
  ord.items.forEach(ci=>{const s=STOCK.find(x=>x.id===ci.id);if(s)s.qty=Math.max(0,s.qty-ci.qty)});
  if(mode==='delivery'){
    bookings.unshift({id:'BK-'+Date.now().toString(36).toUpperCase(),orderId:ord.id,uid:CU.id,user:CU.name,jobId:mj.id||'',jobNo:cartJobNo,date,slot,slotIdx:SLOTS.indexOf(slot),status,ts:new Date().toISOString()});
    saveBk();
  }
  // Send to Apps Script
  toast('Sending order…');
  const action=mode==='pickup'?'submitPickup':'submitOrder';
  postScript({action,...ord}).then(res=>{
    if(res.ok){
      // If delivery, also create calendar booking
      if(mode==='delivery'){
        postScript({
          action:'submitBooking',
          orderId:res.orderId,
          user:ord.user,userPhone:ord.userPhone,
          jobNo:ord.jobNo,siteAddress:ord.siteAddress,
          date,slot,slotKey:SLOTS_KEYS[SLOTS.indexOf(slot)],
          items:ord.items,misc:ord.misc,
          collectRubbish:ord.collectRubbish,
          siteNote:ord.siteNote,
          total:ord.total,weight:ord.weight,
          status
        }).then(bkRes=>{
          if(bkRes.ok) toast('Booking confirmed — calendar updated ✓');
          else toast('Order sent — calendar booking failed, check with Ben');
        });
      } else {
        toast('Pick up order sent ✓');
      }
    } else {
      // Fallback to mailto if script fails
      toast('Script offline — sending email instead');
      const subj=mode==='pickup'?`Yard Pick Up — ${cartJobNo}`:`Yard Delivery — ${cartJobNo} — ${date||''} ${slot||''}`;
      const body=[`ORDER ${ord.id}`,`Foreman: ${ord.user}`,`Job: ${cartJobNo}`,
        mode==='delivery'?`Delivery: ${date} — ${slot}`:'PICK UP',
        ...ord.items.map(i=>`• ${i.name} ×${i.qty}`)].join('\n');
      window.location.href=`mailto:${BEN}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    }
  });

  cart=[];cartMisc={stillage:false,pallet:false,bulka:false};
  cartRubbish=false;cartNote='';cartJobNo='';cartMode=null;bookSlot=null;
  updateBadge();
  go('myorders',false);
}

// ═══ CALENDAR HELPERS ═══
async function fetchCalendarDay(dateStr){
  try{
    // Query previous day UTC start to catch AEST morning times (UTC-10hrs)
    const start=addDays(dateStr,-1)+'T12:00:00Z';
    const end=dateStr+'T13:59:59Z';
    const r=await fetch(`${SCRIPT}?action=bookings&start=${start}&end=${end}`);
    const d=await r.json();
    if(!d.ok)return[];
    // Filter to events that fall on dateStr in AEST (UTC+10)
    return d.bookings.filter(ev=>{
      const local=new Date(ev.start);
      const aestDate=new Date(local.getTime()+10*60*60*1000);
      const y=aestDate.getUTCFullYear();
      const m=String(aestDate.getUTCMonth()+1).padStart(2,'0');
      const day=String(aestDate.getUTCDate()).padStart(2,'0');
      return`${y}-${m}-${day}`===dateStr;
    }).map(ev=>{
      // Convert start/end to AEST for display
      const localStart=new Date(new Date(ev.start).getTime()+10*60*60*1000);
      const localEnd=new Date(new Date(ev.end).getTime()+10*60*60*1000);
      return{...ev,startLocal:localStart,endLocal:localEnd};
    });
  }catch(e){console.log('Calendar fetch error',e);return[];}
}

function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});}

async function loadSchedule(dateStr){
  const body=document.getElementById('sched-body');
  if(body)body.innerHTML=`<div style="font-size:13px;color:var(--text3)">Loading…</div>`;
  const evts=await fetchCalendarDay(dateStr);
  if(!body)return;
  if(!evts.length){body.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:32px">📅</div><div style="margin-top:10px;font-size:14px">No events on ${fmtDate(dateStr)}</div></div>`;return;}
  // Helper: get AEST hour from event
  function aestHour(ev){
    const t=ev.startLocal||new Date(new Date(ev.start).getTime()+10*60*60*1000);
    return t.getUTCHours()+(t.getUTCMinutes()/60);
  }
  function durationHrs(ev){
    // Google all-day events have date-only strings (no T in start)
    if(ev.start && !ev.start.includes('T')) return 24;
    return(new Date(ev.end)-new Date(ev.start))/3600000;
  }

  // Categorise: all-day/multi-slot vs slot-specific
  const allDay=evts.filter(ev=>ev.allDay||durationHrs(ev)>=24||aestHour(ev)<6);
  const slotEvts=evts.filter(ev=>!ev.allDay&&durationHrs(ev)<24&&aestHour(ev)>=6);

  // Assign to nearest slot by start time
  // Slot 0: 7:00–9:59, Slot 1: 10:00–12:59, Slot 2: 13:00+
  function slotFor(ev){
    const h=aestHour(ev);
    if(h<10)return 0;
    if(h<13)return 1;
    return 2;
  }

  const allDayHtml=allDay.length?`
    <div class="sched-slot">
      <div class="sched-slot-hdr">All day · ${allDay.length} event${allDay.length!==1?'s':''}</div>
      ${allDay.map((ev,idx)=>{
        const eid=`se-ad-${idx}`;
        const addr=ev.location||ev.title||'';
        const shortAddr=addr.split(',')[0]||ev.title;
        const aestStart=ev.startLocal||new Date(new Date(ev.start).getTime()+10*60*60*1000);
        const aestEnd=new Date(new Date(ev.end).getTime()+10*60*60*1000);
        const timeStr=`${String(aestStart.getUTCHours()).padStart(2,'0')}:${String(aestStart.getUTCMinutes()).padStart(2,'0')} – ${String(aestEnd.getUTCHours()).padStart(2,'0')}:${String(aestEnd.getUTCMinutes()).padStart(2,'0')}`;
        return`<div class="sched-event" onclick="toggleSchedEvent('${eid}')">
          <div class="sched-event-hdr">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">📌</span>
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--text)">${shortAddr}</div>
                <div style="font-size:11px;color:var(--text3)">${timeStr}</div>
              </div>
            </div>
            <span id="${eid}-arrow" style="color:var(--text3);font-size:12px">▾</span>
          </div>
          <div class="sched-event-body" id="${eid}">
            <div style="padding-top:10px;font-size:12px;color:var(--text2);white-space:pre-line">${ev.description||ev.title||'No details'}</div>
            ${addr?`<div style="display:flex;gap:8px;margin-top:10px">
              <a href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank" style="flex:1;padding:8px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--blue);font-size:12px;font-weight:600;text-decoration:none;text-align:center">📍 Maps</a>
              <a href="waze://?q=${encodeURIComponent(addr)}" style="flex:1;padding:8px;border-radius:8px;background:rgba(34,197,94,.12);color:var(--green);font-size:12px;font-weight:600;text-decoration:none;text-align:center">🗺️ Waze</a>
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`:'';

  body.innerHTML=allDayHtml+SLOT_HOURS.map(([sh,sm,eh,em],i)=>{
    const se=slotEvts.filter(ev=>slotFor(ev)===i);
    return`<div class="sched-slot">
      <div class="sched-slot-hdr">${SLOTS[i]}${se.length?` <span style="font-size:10px;opacity:.7">${se.length} booking${se.length!==1?'s':''}</span>`:''}</div>
      ${se.length?se.map((ev,idx)=>{
        const eid=`se-${i}-${idx}`;
        const addr=ev.location||ev.title||'';
        const shortAddr=addr.split(',')[0]||ev.title;
        const aestStart=ev.startLocal||new Date(new Date(ev.start).getTime()+10*60*60*1000);
        const timeStr=`${String(aestStart.getUTCHours()).padStart(2,'0')}:${String(aestStart.getUTCMinutes()).padStart(2,'0')}`;
        return`<div class="sched-event" onclick="toggleSchedEvent('${eid}')">
          <div class="sched-event-hdr">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">🚛</span>
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--text)">${shortAddr}</div>
                <div style="font-size:11px;color:var(--text3)">${timeStr}</div>
              </div>
            </div>
            <span id="${eid}-arrow" style="color:var(--text3);font-size:12px">▾</span>
          </div>
          <div class="sched-event-body" id="${eid}">
            <div style="padding-top:10px;font-size:12px;color:var(--text2);white-space:pre-line">${ev.description||'No additional details'}</div>
            ${addr?`<div style="display:flex;gap:8px;margin-top:10px">
              <a href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank" style="flex:1;padding:8px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--blue);font-size:12px;font-weight:600;text-decoration:none;text-align:center">📍 Maps</a>
              <a href="waze://?q=${encodeURIComponent(addr)}" style="flex:1;padding:8px;border-radius:8px;background:rgba(34,197,94,.12);color:var(--green);font-size:12px;font-weight:600;text-decoration:none;text-align:center">🗺️ Waze</a>
            </div>`:''}
          </div>
        </div>`;
      }).join(''):`<div style="padding:10px;font-size:12px;color:var(--text3)">No bookings in this slot</div>`}
    </div>`;
  }).join('');
} // end loadSchedule

  // Destroy old map
  if(_radarMap){_radarMap.remove();_radarMap=null;}
  if(_radarTimer){clearInterval(_radarTimer);_radarTimer=null;}
  _radarLayers=[];_radarFrame=0;

  // Load Leaflet JS if needed
  if(!window.L){
    const s=document.createElement('script');
    s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    s.onload=()=>buildMap(wxKey);
    document.head.appendChild(s);
  } else {
    buildMap(wxKey);
  }
}

function buildMap(wxKey){
  const el=document.getElementById('radar-map');if(!el)return;
  const coords=COORDS[wxKey]||COORDS['yard'];

  _radarMap=L.map('radar-map',{
    center:[coords.lat,coords.lon],zoom:9,
    zoomControl:false,attributionControl:false,
    dragging:false,scrollWheelZoom:false,doubleClickZoom:false
  });

  // Dark base tiles
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19
  }).addTo(_radarMap);

  // Yard marker
  const dot=L.divIcon({html:'<div style="width:8px;height:8px;background:#f97316;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 4px rgba(249,115,22,.3)"></div>',iconSize:[8,8],iconAnchor:[4,4]});
  L.marker([coords.lat,coords.lon],{icon:dot}).addTo(_radarMap);

  // Fetch RainViewer frames
  fetch('https://api.rainviewer.com/public/weather-maps.json')
    .then(r=>r.json())
    .then(data=>{
      const past=data.radar.past||[];
      const nowcast=data.radar.nowcast||[];
      const allFrames=[...past.slice(-4),...nowcast.slice(0,2)];

      allFrames.forEach(frame=>{
        const layer=L.tileLayer(`https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,{
          opacity:0,tileSize:256,zIndex:2
        }).addTo(_radarMap);
        _radarLayers.push({layer,ts:frame.time});
      });

      if(_radarLayers.length){
        _radarLayers[0].layer.setOpacity(0.6);
        animateRadar();
      }
    })
    .catch(()=>{
      const t=document.getElementById('radar-time');
      if(t)t.textContent='Offline';
    });
}

function animateRadar(){
  _radarTimer=setInterval(()=>{
    if(!_radarLayers.length)return;
    _radarLayers.forEach(f=>f.layer.setOpacity(0));
    _radarFrame=(_radarFrame+1)%_radarLayers.length;
    _radarLayers[_radarFrame].layer.setOpacity(0.6);
    const ts=_radarLayers[_radarFrame].ts;
    const t=document.getElementById('radar-time');
    if(t){
      const isNow=_radarFrame<(_radarLayers.length-2);
      const d=new Date(ts*1000);
      t.textContent=isNow?d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit'}):'Forecast';
    }
  },800);
}

// ═══ INIT ═══
window.onload=()=>{
  STOCK.forEach(s=>{s.minStock=s.minStock||0;s.fullStock=s.fullStock||0;if(!cardQty[s.id])cardQty[s.id]=0});
  schedDate=new Date().toISOString().split('T')[0];
  go('public',false);
};
document.addEventListener('click',e=>{
  if(!e.target.closest('.prod-card')&&!e.target.closest('#spec-bubble')){hideSpec();lastTapId=null}
});
</script>
